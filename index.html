<!DOCTYPE html> <!-- HTML5 Dokument -->
<html lang="de"> <!-- Sprache Deutsch -->
<head> <!-- Kopfbereich -->
<meta charset="UTF-8"> <!-- Zeichensatz UTF-8 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive Ansicht -->
<title>GameZone Pro</title> <!-- Titel im Browser -->
<style> /* CSS Start */
body{margin:0;background:#050816;color:white;font-family:Arial,sans-serif;} /* Grunddesign */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:20px;background:rgba(0,0,0,.8);} /* Navbar */
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=1800');background-size:cover;} /* Hero Bereich */
h1{font-size:6rem;color:#00e5ff;} /* Haupttitel */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px;} /* Karten Raster */
.card{background:#10172b;border-radius:15px;overflow:hidden;} /* Karte */
.card img{width:100%;} /* Kartenbild */
.card div{padding:15px;} /* Karteninhalt */
footer{text-align:center;padding:30px;background:#02040d;} /* Footer */
a{color:#00e5ff;} /* Links */
</style> <!-- CSS Ende -->
</head> <!-- Ende Kopfbereich -->
<body> <!-- Seiteninhalt -->

<nav> <!-- Navigation -->
<div>GAMEZONE</div> <!-- Logo -->
<div>Home Games Stats News Support</div> <!-- Menüpunkte -->
</nav> <!-- Ende Navigation -->

<section class="hero"> <!-- Hero -->
<h1>GAMEZONE</h1> <!-- Hauptüberschrift -->
<p>Dein Shop für Games, News und Gaming Action</p> <!-- Untertitel -->
</section> <!-- Ende Hero -->

<section class="cards"> <!-- Spielebereich -->
<div class="card"><img src="https://cdn.cloudflare.steamstatic.com/steam/apps/252950/header.jpg"><div><h3>Rocket League</h3><p>Free</p></div></div> <!-- Spielkarte -->
<div class="card"><img src="https://cdn.cloudflare.steamstatic.com/steam/apps/730/header.jpg"><div><h3>Counter-Strike 2</h3><p>Free</p></div></div> <!-- Spielkarte -->
<div class="card"><img src="https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg"><div><h3>GTA V</h3><p>29,99€</p></div></div> <!-- Spielkarte -->
<div class="card"><img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg"><div><h3>Elden Ring</h3><p>59,99€</p></div></div> <!-- Spielkarte -->
</section> <!-- Ende Spielebereich -->

<section> <!-- Support Bereich -->
<h2>Support</h2> <!-- Titel -->
<p>E-Mail: <a href="mailto:GameZoneOfficial@gmail.com">GameZoneOfficial@gmail.com</a></p> <!-- Mail Link -->
<p>Telefon: <a href="tel:+436644939331">+43 664 4939 331</a></p> <!-- Telefon Link -->
</section> <!-- Ende Support -->

<footer> <!-- Footer -->
© 2025 GameZone <!-- Copyright -->
</footer> <!-- Ende Footer -->

</body> <!-- Ende Body -->
</html> <!-- Ende HTML -->
